<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>票据管理</title>
<style>
  :root{--bg:#fafafa;--fg:#171717;--card:#fff;--border:#e5e5e5;--muted:#a3a3a3;--primary:#171717;--primary-fg:#fafafa;--accent:#f5f5f5;--radius:8px;--error:#ef4444;--ok:#22c55e;--warn:#eab308}
  .dark{--bg:#0a0a0a;--fg:#e5e5e5;--card:#171717;--border:#262626;--muted:#737373;--primary:#e5e5e5;--primary-fg:#0a0a0a;--accent:#262626;--error:#f87171;--ok:#4ade80;--warn:#facc15}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5}
  a{color:var(--fg);text-decoration:none}
  .nav{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:24px}
  .nav-brand{font-weight:700;font-size:15px}
  .nav-links{display:flex;gap:4px}
  .nav-link{padding:8px 12px;font-size:14px;color:var(--muted);border-radius:var(--radius);cursor:pointer;transition:all .15s}
  .nav-link:hover,.nav-link.active{color:var(--fg);background:var(--accent)}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .nav-user{font-size:13px;color:var(--muted)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--card);color:var(--fg);transition:all .15s}
  .btn:hover{background:var(--accent)}
  .btn-primary{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .btn-primary:hover{opacity:.9}
  .btn-sm{padding:4px 10px;font-size:13px}
  input,select{padding:8px 12px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--fg);outline:none;transition:border .15s}
  input:focus,select:focus{border-color:var(--muted)}
  label{font-size:13px;color:var(--muted);margin-bottom:4px;display:block}
  .form-group{margin-bottom:12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .card-header{font-size:15px;font-weight:600;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 12px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  td{padding:10px 12px;border-bottom:1px solid var(--border)}
  tr:hover td{background:var(--accent)}
  .badge{display:inline-block;padding:2px 8px;font-size:11px;border-radius:9999px;font-weight:500}
  .badge-ok{background:#dcfce7;color:#166534}
  .badge-pending{background:#fef9c3;color:#854d0e}
  .dark .badge-ok{background:#14532d;color:#86efac}
  .dark .badge-pending{background:#713f12;color:#fde047}
  .login-wrap{max-width:380px;margin:120px auto}
  .login-wrap .card{padding:32px}
  .login-wrap h2{text-align:center;font-size:20px;margin-bottom:24px}
  .login-wrap .btn{width:100%;justify-content:center;margin-top:8px}
  .login-wrap .switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
  .login-wrap .switch a{color:var(--fg);text-decoration:underline;cursor:pointer}
  .error-msg{color:var(--error);font-size:13px;margin-top:4px}
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;cursor:pointer;transition:all .15s}
  .upload-zone:hover{border-color:var(--muted);background:var(--accent)}
  .upload-zone input{display:none}
  .upload-zone p{color:var(--muted);font-size:14px}
  .ocr-card{border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px}
  .ocr-card .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .ocr-card .actions{display:flex;gap:8px;margin-top:16px}
  .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .container{max-width:1200px;margin:0 auto;padding:24px}
  .theme-toggle{cursor:pointer;padding:4px;color:var(--muted)}
  .hidden{display:none!important}
  .status-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
</style>
</head>
<body>
<div id="authPage">
  <div class="login-wrap">
    <div class="card">
      <h2 id="authTitle">登录</h2>
      <div class="form-group"><label>手机号</label><input type="tel" id="authPhone" placeholder="请输入手机号"></div>
      <div class="form-group"><label>密码</label><input type="password" id="authPassword" placeholder="请输入密码"></div>
      <div id="regFields" class="hidden">
        <div class="form-group"><label>客户名称</label><input type="text" id="authCustomer" placeholder="绑定的客户名"></div>
        <div class="form-group"><label>昵称</label><input type="text" id="authNickname" placeholder="显示名称"></div>
      </div>
      <div id="authError" class="error-msg hidden"></div>
      <button class="btn btn-primary" id="authBtn" onclick="doAuth()">登录</button>
      <div class="switch"><span id="authSwitchText">没有账号？</span><a id="authSwitchLink" onclick="toggleAuthMode()">注册</a></div>
    </div>
  </div>
</div>

<div id="mainPage" class="hidden">
  <nav class="nav">
    <div class="nav-brand">📋 票据管理</div>
    <div class="nav-links">
      <div class="nav-link active" data-tab="upload" onclick="switchTab('upload')">录入</div>
      <div class="nav-link" data-tab="list" onclick="switchTab('list')">列表</div>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="userDisplay"></span>
      <div class="theme-toggle" onclick="toggleTheme()" title="切换深色模式">🌓</div>
      <button class="btn btn-sm" onclick="doLogout()">退出</button>
    </div>
  </nav>
  <div class="container">
    <div id="tabUpload">
      <div class="card">
        <div class="card-header">上传票据</div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" multiple onchange="handleUpload(this.files)">
          <p>📷 点击上传票据图片</p>
          <p style="font-size:12px;margin-top:4px;">支持jpg/png，可批量上传</p>
        </div>
        <div id="ocrResults"></div>
      </div>
    </div>
    <div id="tabList" class="hidden">
      <div class="card">
        <div class="card-header">票据列表</div>
        <div class="filter-bar">
          <select id="filterShop" onchange="loadBills()"><option value="">全部档口</option></select>
          <input type="date" id="filterFrom" onchange="loadBills()">
          <input type="date" id="filterTo" onchange="loadBills()">
        </div>
        <table>
          <thead><tr><th>批次号</th><th>档口</th><th>日期</th><th>付款</th><th>拿货</th><th>退货</th><th>结余</th><th>性质</th><th>操作</th></tr></thead>
          <tbody id="billBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API='/api/bill';
let token=localStorage.getItem('bill_token');
let currentUser=null;
let isRegister=false;

if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&matchMedia('(prefers-color-scheme:dark)').matches))
  document.documentElement.classList.add('dark');
function toggleTheme(){document.documentElement.classList.toggle('dark');localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light')}

function toggleAuthMode(){
  isRegister=!isRegister;
  document.getElementById('authTitle').textContent=isRegister?'注册':'登录';
  document.getElementById('regFields').classList.toggle('hidden',!isRegister);
  document.getElementById('authBtn').textContent=isRegister?'注册':'登录';
  document.getElementById('authSwitchText').textContent=isRegister?'已有账号？':'没有账号？';
  document.getElementById('authSwitchLink').textContent=isRegister?'登录':'注册';
  document.getElementById('authError').classList.add('hidden');
}

async function doAuth(){
  const phone=document.getElementById('authPhone').value.trim();
  const password=document.getElementById('authPassword').value;
  const endpoint=isRegister?'/register':'/login';
  const body={phone,password};
  if(isRegister){body.customer_name=document.getElementById('authCustomer').value.trim();body.nickname=document.getElementById('authNickname').value.trim();}
  try{
    const res=await fetch(API+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(data.error){document.getElementById('authError').textContent=data.error;document.getElementById('authError').classList.remove('hidden');return;}
    if(isRegister){toggleAuthMode();return;}
    token=data.token;currentUser=data.user;localStorage.setItem('bill_token',token);showMain();
  }catch(e){document.getElementById('authError').textContent='网络错误';document.getElementById('authError').classList.remove('hidden');}
}

function doLogout(){token=null;currentUser=null;localStorage.removeItem('bill_token');location.reload();}

function showMain(){
  document.getElementById('authPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('userDisplay').textContent=`${currentUser.nickname||currentUser.phone} · ${currentUser.customer_name||''}`;
  loadShops();
}

function switchTab(tab){
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  document.getElementById('tabUpload').classList.toggle('hidden',tab!=='upload');
  document.getElementById('tabList').classList.toggle('hidden',tab!=='list');
  if(tab==='list')loadBills();
}

async function handleUpload(files){
  if(!files.length)return;
  const div=document.getElementById('ocrResults');
  div.innerHTML='<p style="color:var(--muted)">识别中...</p>';
  for(const file of files){
    const fd=new FormData();fd.append('image',file);
    try{
      const res=await fetch(API+'/ocr',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});
      const data=await res.json();
      if(data.error){div.innerHTML+=`<p class="error-msg">${data.error}</p>`;continue;}
      renderOcr(data,file.name,div);
    }catch(e){div.innerHTML+=`<p class="error-msg">上传失败: ${e.message}</p>`;}
  }
}

function renderOcr(data,name,container){
  const d=document.createElement('div');d.className='ocr-card';
  d.innerHTML=`
    <div class="status-row"><strong>${name}</strong><span class="badge badge-pending">待确认</span></div>
    <div class="fields">
      <div class="form-group"><label>批次号</label><input data-k="批次号" value="${data.批次号||''}"></div>
      <div class="form-group"><label>档口名称</label><input data-k="档口名称" value="${data.档口名称||''}"></div>
      <div class="form-group"><label>开单日期</label><input data-k="开单日期" type="date" value="${data.开单日期||''}"></div>
      <div class="form-group"><label>付款金额</label><input data-k="付款金额" type="number" value="${data.付款金额||''}"></div>
      <div class="form-group"><label>拿货件数</label><input data-k="拿货件数" type="number" value="${data.拿货件数||''}"></div>
      <div class="form-group"><label>退货件数</label><input data-k="退货件数" type="number" value="${data.退货件数||''}"></div>
      <div class="form-group"><label>上次结余</label><input data-k="上次结余" type="number" value="${data.上次结余||''}"></div>
      <div class="form-group"><label>累计结余</label><input data-k="累计结余" type="number" value="${data.累计结余||''}"></div>
      <div class="form-group"><label>客户</label><input data-k="客户" value="${data.客户||''}"></div>
      <div class="form-group"><label>地址</label><input data-k="地址" value="${data.地址||''}"></div>
    </div>
    <details style="margin-top:12px"><summary style="cursor:pointer;font-size:13px;color:var(--muted)">OCR原文</summary><pre style="font-size:12px;margin-top:8px;white-space:pre-wrap;max-height:200px;overflow:auto;padding:12px;background:var(--accent);border-radius:var(--radius)">${data.raw_text||''}</pre></details>
    <div class="actions">
      <button class="btn btn-primary btn-sm" onclick="confirmBill(this)">确认保存</button>
      <button class="btn btn-sm" onclick="this.closest('.ocr-card').remove()">取消</button>
    </div>`;
  d.dataset.raw=JSON.stringify(data);
  container.appendChild(d);
}

async function confirmBill(btn){
  const card=btn.closest('.ocr-card');
  const data=JSON.parse(card.dataset.raw);
  card.querySelectorAll('[data-k]').forEach(inp=>{
    let v=inp.value;
    if(inp.type==='number'&&v)v=parseFloat(v);
    data[inp.dataset.k]=v;
  });
  data.单据内容=data.raw_text;
  data.单据截图=data.image_path;
  try{
    const res=await fetch(API+'/bills',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(data)});
    const r=await res.json();
    if(r.success){card.querySelector('.badge').className='badge badge-ok';card.querySelector('.badge').textContent='已保存';btn.disabled=true;btn.textContent='已保存';}
    else alert('保存失败: '+(r.error||''));
  }catch(e){alert('网络错误: '+e.message);}
}

async function loadBills(){
  const shop=document.getElementById('filterShop').value;
  const from=document.getElementById('filterFrom').value;
  const to=document.getElementById('filterTo').value;
  let url=API+'/bills?';
  if(shop)url+=`档口名称=${encodeURIComponent(shop)}&`;
  if(from)url+=`dateFrom=${from}&`;
  if(to)url+=`dateTo=${to}&`;
  try{
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    document.getElementById('billBody').innerHTML=(data.bills||[]).map(b=>`
      <tr>
        <td>${b.批次号||''}</td>
        <td>${b.档口名称||''}</td>
        <td>${b.开单日期?new Date(b.开单日期).toLocaleDateString():''}</td>
        <td>${b.付款金额||''}</td>
        <td>${b.拿货件数||''}</td>
        <td>${b.退货件数||''}</td>
        <td>${b.累计结余||''}</td>
        <td>${b.单据性质||''}</td>
        <td><button class="btn btn-sm" onclick="editBill(${b.id})">编辑</button></td>
      </tr>`).join('');
  }catch(e){}
}

async function loadShops(){
  try{
    const res=await fetch(API+'/shops',{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    document.getElementById('filterShop').innerHTML='<option value="">全部档口</option>'+(data.shops||[]).map(s=>`<option>${s}</option>`).join('');
  }catch(e){}
}

if(token){
  fetch(API+'/me',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()).then(d=>{
    if(d.user){currentUser=d.user;showMain();}
  }).catch(()=>{});
}
</script>
</body>
</html>
